<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Procedure - TCS S.r.l.</title>
  <style>
    *{box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f7fa;margin:0;padding:20px;color:#333}
    .container{max-width:800px;margin:0 auto}
    header{display:flex;align-items:center;gap:16px;margin-bottom:28px}
    .back{display:inline-flex;align-items:center;gap:6px;color:#1a73e8;text-decoration:none;font-size:14px;padding:8px 14px;border:1px solid #1a73e8;border-radius:4px}
    .back:hover{background:#e8f0fe}
    h1{color:#1a73e8;margin:0;font-size:22px}
    .file-list{background:#fff;border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.08);overflow:hidden}
    .file-item{display:flex;align-items:center;gap:14px;padding:16px 20px;border-bottom:1px solid #f1f3f4;text-decoration:none;color:#333;transition:background .15s}
    .file-item:last-child{border-bottom:none}
    .file-item:hover{background:#f5f7fa}
    .file-icon{font-size:28px;flex-shrink:0}
    .file-info{flex:1}
    .file-name{font-size:15px;font-weight:500;margin-bottom:2px}
    .file-desc{font-size:13px;color:#666}
    .file-arrow{color:#1a73e8;font-size:18px}
    .empty{text-align:center;padding:60px 20px;color:#888}
    .empty-icon{font-size:48px;margin-bottom:12px}
  </style>
</head>
<body>
  <div class="container">
    <header>
      <a href="../materiale.html" class="back">← Torna al modulo</a>
      <h1>📁 Procedure operative</h1>
    </header>

    <div class="file-list">
      <!-- ================================================== -->
      <!-- AGGIUNGI QUI I TUOI FILE — copia e incolla il      -->
      <!-- blocco .file-item per ogni documento               -->
      <!-- ================================================== -->

      <a class="file-item" href="guida-richiesta-materiale.pdf" target="_blank">
        <div class="file-icon">📄</div>
        <div class="file-info">
          <div class="file-name">Guida richiesta materiale</div>
          <div class="file-desc">Come compilare e inviare una richiesta materiale</div>
        </div>
        <div class="file-arrow">›</div>
      </a>

      <!-- ESEMPIO — decommenta e modifica per aggiungere altri file:
      <a class="file-item" href="nome-file.pdf" target="_blank">
        <div class="file-icon">📄</div>
        <div class="file-info">
          <div class="file-name">Titolo documento</div>
          <div class="file-desc">Descrizione breve</div>
        </div>
        <div class="file-arrow">›</div>
      </a>
      -->
    </div>

  </div>
</body>
</html>
