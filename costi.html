<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calcolo Costi Manodopera</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');
:root{--bg:#f5f4f0;--surface:#fff;--surface2:#f0efe9;--surface3:#e8e7e0;--border:#e0dfd8;--border2:#cccbc2;--text:#1a1a18;--text2:#6b6a62;--text3:#9b9a92;--font:'IBM Plex Sans',sans-serif;--mono:'IBM Plex Mono',monospace;--radius:8px;--green:#2d6a2d;--blue:#1a4a7a;--red:#c0392b;--amber:#c07000}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-brand{font-family:var(--mono);font-size:13px;color:var(--text2)}
.topbar-brand strong{color:var(--text);font-weight:600}
.main{max-width:1100px;margin:0 auto;padding:28px 24px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:20px}
.card-title{font-size:11px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.1em;color:var(--text3);margin-bottom:16px;padding-bottom:11px;border-bottom:1px solid var(--border)}
.btn{border-radius:6px;padding:9px 18px;font-size:13px;font-weight:500;font-family:var(--font);cursor:pointer;border:1px solid var(--border2);background:var(--surface2);color:var(--text);white-space:nowrap;transition:all .15s}
.btn:hover{background:var(--surface3)}
.btn-accent{background:var(--text);color:#fff;border-color:var(--text)}
.btn-accent:hover{opacity:.88}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
@media(max-width:700px){.grid2{grid-template-columns:1fr}.grid3{grid-template-columns:1fr}}
.fg{display:flex;flex-direction:column;gap:5px}
label{font-size:10px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.08em;color:var(--text3)}
input,select{background:var(--surface);border:1px solid var(--border2);border-radius:6px;padding:9px 12px;font-size:13px;font-family:var(--font);color:var(--text);width:100%}
input:focus,select:focus{outline:none;border-color:var(--text)}
.commessa-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border:1px solid var(--border);border-radius:6px;cursor:pointer;margin-bottom:8px;transition:all .15s}
.commessa-item:hover{border-color:var(--text);background:var(--surface2)}
.commessa-item.selected{border-color:var(--blue);background:#e8f0fa}
.commessa-code{font-family:var(--mono);font-size:12px;color:var(--blue);font-weight:500;min-width:100px}
.commessa-info{flex:1;font-size:13px}
.commessa-info span{color:var(--text2);font-size:12px}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;font-size:10px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.08em;color:var(--text3);padding:10px 12px;border-bottom:1px solid var(--border2);white-space:nowrap;background:var(--surface2)}
td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
td input{padding:7px 10px;font-size:13px}
tr:last-child td{border-bottom:none}
.tot-bar{display:flex;gap:24px;flex-wrap:wrap;padding:16px 20px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:20px}
.tot-item{display:flex;flex-direction:column;gap:3px}
.tot-label{font-size:10px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.08em;color:var(--text3)}
.tot-val{font-size:22px;font-weight:300;letter-spacing:-.5px}
.tot-val.green{color:var(--green)}
.tot-val.blue{color:var(--blue)}
.tot-val.amber{color:var(--amber)}
.tot-val.red{color:var(--red)}
.tot-val.big{font-size:28px;font-weight:500}
.empty{text-align:center;padding:40px;color:var(--text3);font-family:var(--mono);font-size:13px}
.alert{padding:12px 16px;border-radius:6px;font-size:13px;margin-bottom:16px;display:none}
.alert.show{display:block}
.alert-err{background:#fae8e8;color:#7a1a1a;border:1px solid #e8b8b8}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-family:var(--mono);background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
.section-title{font-size:15px;font-weight:600;margin-bottom:4px}
.section-sub{font-size:13px;color:var(--text2);margin-bottom:16px}
.cost-row{background:var(--surface2)}
@media print{
  .topbar,.no-print{display:none!important}
  body{background:#fff}
  .card{border:1px solid #ccc;box-shadow:none}
}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-brand">&#9672; <strong>Costi</strong> Manodopera</div>
  <div style="display:flex;gap:10px;align-items:center">
    <button class="btn no-print" onclick="window.print()">🖨️ Stampa</button>
    <a href="dashboard.html" style="padding:7px 14px;font-size:13px;border:1px solid var(--border2);border-radius:6px;color:var(--text);text-decoration:none;background:var(--surface2)">← Dashboard</a>
  </div>
</div>

<div class="main">
  <div id="alert" class="alert alert-err"></div>

  <!-- STEP 1: Seleziona commessa -->
  <div class="card" id="step1">
    <div class="card-title">1 — Seleziona commessa</div>
    <div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap">
      <input type="text" id="search-commessa" placeholder="Cerca commessa, cliente..." oninput="filtraCommesse()" style="max-width:300px">
      <button class="btn btn-accent" onclick="caricaCommesse()">↻ Aggiorna</button>
    </div>
    <div id="lista-commesse"><div class="empty">Caricamento...</div></div>
  </div>

  <!-- STEP 2: Tariffe -->
  <div class="card" id="step2" style="display:none">
    <div class="card-title">2 — Tariffe orarie (€/h)</div>
    <div id="commessa-sel-info" style="margin-bottom:16px"></div>
    <div id="tabella-tariffe"></div>
    <div style="margin-top:16px;display:flex;gap:10px;flex-wrap:wrap">
      <button class="btn btn-accent" onclick="calcolaCosti()">📊 Calcola costi</button>
      <button class="btn no-print" onclick="resetSelezione()">← Cambia commessa</button>
    </div>
  </div>

  <!-- STEP 3: Risultato -->
  <div id="step3" style="display:none">
    <div class="tot-bar" id="tot-bar"></div>
    <div class="card">
      <div class="card-title">Dettaglio per operaio</div>
      <div class="table-wrap">
        <table id="tabella-risultato">
          <thead>
            <tr>
              <th>Operaio</th>
              <th style="text-align:right">Ore ord.</th>
              <th style="text-align:right">€/h ord.</th>
              <th style="text-align:right">Costo ord.</th>
              <th style="text-align:right">Ore str.</th>
              <th style="text-align:right">€/h str.</th>
              <th style="text-align:right">Costo str.</th>
              <th style="text-align:right">Ore viag.</th>
              <th style="text-align:right">€/h viag.</th>
              <th style="text-align:right">Costo viag.</th>
              <th style="text-align:right">Totale</th>
            </tr>
          </thead>
          <tbody id="tbody-risultato"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzKHF52x6L9ZnZHxVq1iENY1koRe1ynG_4u_HLuFD8uCXPQhZbqRkDZa3Z7nqemvw_G/exec';

let tuttiRapportini = [];
let commesseMap = {};
let commessaSelezionata = null;
let tarifffeSalvate = JSON.parse(localStorage.getItem('tariffe_costi') || '{}');

function el(id){ return document.getElementById(id); }
function fmt(n){ n=Number(n)||0; return n%1===0?n:n.toFixed(1); }
function fmtEur(n){ return '€ '+(Number(n)||0).toFixed(2).replace('.',','); }
function showAlert(msg){ var a=el('alert'); a.textContent=msg; a.classList.add('show'); setTimeout(()=>a.classList.remove('show'),5000); }

async function caricaCommesse(){
  el('lista-commesse').innerHTML = '<div class="empty">Caricamento...</div>';
  try {
    var res = await fetch(SCRIPT_URL + '?action=list&_dc=' + Date.now());
    var d = await res.json();
    if(!d.ok) throw new Error(d.error);
    tuttiRapportini = d.rapportini || [];

    // Raggruppa per commessa
    commesseMap = {};
    tuttiRapportini.forEach(function(r){
      var key = r.commessa || '(senza commessa)';
      if(!commesseMap[key]){
        commesseMap[key] = {
          commessa: key,
          cliente: r.cliente || '',
          rapportini: [],
          operai: {},
          totLav: 0, totViag: 0, totStr: 0
        };
      }
      commesseMap[key].rapportini.push(r);
      commesseMap[key].totLav += r.totLav || 0;
      commesseMap[key].totViag += r.totViag || 0;
      commesseMap[key].totStr += r.totStr || 0;
    });
    filtraCommesse();
  } catch(e){
    el('lista-commesse').innerHTML = '<div class="empty">Errore: ' + e.message + '</div>';
  }
}

function filtraCommesse(){
  var q = (el('search-commessa').value || '').toLowerCase().trim();
  var lista = Object.values(commesseMap).filter(function(c){
    if(!q) return true;
    return (c.commessa + ' ' + c.cliente).toLowerCase().includes(q);
  }).sort(function(a,b){ return a.commessa.localeCompare(b.commessa); });

  if(!lista.length){
    el('lista-commesse').innerHTML = '<div class="empty">Nessuna commessa trovata</div>';
    return;
  }
  el('lista-commesse').innerHTML = lista.map(function(c){
    return '<div class="commessa-item" onclick="selezionaCommessa(\''+esc(c.commessa)+'\')">'+
      '<div class="commessa-code">'+esc(c.commessa)+'</div>'+
      '<div class="commessa-info">'+esc(c.cliente)+'<br><span>'+c.rapportini.length+' rapportini &middot; '+fmt(c.totLav)+'h lav. &middot; '+fmt(c.totStr)+'h str. &middot; '+fmt(c.totViag)+'h viag.</span></div>'+
      '<div class="badge">'+c.rapportini.length+'</div>'+
    '</div>';
  }).join('');
}

function esc(s){ if(!s) return ''; return String(s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]}); }

function selezionaCommessa(commessa){
  commessaSelezionata = commesseMap[commessa];
  if(!commessaSelezionata) return;

  // Raccogli operai unici con ore totali
  var operaiMap = {};
  commessaSelezionata.rapportini.forEach(function(r){
    (r.operai || []).forEach(function(o){
      var nome = (o.nome || '').trim().toUpperCase();
      if(!nome) return;
      if(!operaiMap[nome]) operaiMap[nome] = { nome: nome, oreLav: 0, oreViag: 0, oreStr: 0 };
      operaiMap[nome].oreLav  += parseFloat(o.oreLav)  || 0;
      operaiMap[nome].oreViag += parseFloat(o.oreViag) || 0;
      operaiMap[nome].oreStr  += parseFloat(o.oreStr)  || 0;
    });
  });
  commessaSelezionata.operaiMap = operaiMap;

  // Mostra info commessa
  el('commessa-sel-info').innerHTML =
    '<div style="display:flex;gap:16px;flex-wrap:wrap;padding:12px 16px;background:var(--surface2);border-radius:6px;margin-bottom:16px">' +
    '<div><div style="font-size:10px;font-family:var(--mono);text-transform:uppercase;color:var(--text3)">Commessa</div><div style="font-weight:600">'+esc(commessa)+'</div></div>' +
    '<div><div style="font-size:10px;font-family:var(--mono);text-transform:uppercase;color:var(--text3)">Cliente</div><div>'+esc(commessaSelezionata.cliente)+'</div></div>' +
    '<div><div style="font-size:10px;font-family:var(--mono);text-transform:uppercase;color:var(--text3)">Rapportini</div><div>'+commessaSelezionata.rapportini.length+'</div></div>' +
    '</div>';

  // Tabella tariffe
  var operai = Object.values(operaiMap);
  el('tabella-tariffe').innerHTML =
    '<table><thead><tr>' +
    '<th>Operaio</th>' +
    '<th style="text-align:right">Ore ord.</th>' +
    '<th style="text-align:right">Ore str.</th>' +
    '<th style="text-align:right">Ore viag.</th>' +
    '<th>€/h ordinario</th>' +
    '<th>€/h straord.</th>' +
    '<th>€/h viaggio</th>' +
    '</tr></thead><tbody>' +
    operai.map(function(o){
      var t = tarifffeSalvate[o.nome] || {};
      return '<tr>'+
        '<td style="font-weight:500">'+esc(o.nome)+'</td>'+
        '<td style="text-align:right;font-family:var(--mono)">'+fmt(o.oreLav)+'h</td>'+
        '<td style="text-align:right;font-family:var(--mono)">'+fmt(o.oreStr)+'h</td>'+
        '<td style="text-align:right;font-family:var(--mono)">'+fmt(o.oreViag)+'h</td>'+
        '<td><input type="number" id="tar-lav-'+btoa(o.nome).replace(/=/g,'')+'" value="'+(t.lav||'')+'" placeholder="0.00" min="0" step="0.5" onchange="salvaTariffa(\''+esc(o.nome)+'\')"></td>'+
        '<td><input type="number" id="tar-str-'+btoa(o.nome).replace(/=/g,'')+'" value="'+(t.str||'')+'" placeholder="0.00" min="0" step="0.5" onchange="salvaTariffa(\''+esc(o.nome)+'\')"></td>'+
        '<td><input type="number" id="tar-viag-'+btoa(o.nome).replace(/=/g,'')+'" value="'+(t.viag||'')+'" placeholder="0.00" min="0" step="0.5" onchange="salvaTariffa(\''+esc(o.nome)+'\')"></td>'+
      '</tr>';
    }).join('') +
    '</tbody></table>';

  el('step1').style.display = 'none';
  el('step2').style.display = 'block';
  el('step3').style.display = 'none';
}

function btoa_safe(s){ try{ return btoa(unescape(encodeURIComponent(s))); } catch(e){ return btoa(s); } }

function salvaTariffa(nome){
  var id = btoa(nome).replace(/=/g,'');
  var lav  = parseFloat(document.getElementById('tar-lav-'+id)?.value) || 0;
  var str  = parseFloat(document.getElementById('tar-str-'+id)?.value) || 0;
  var viag = parseFloat(document.getElementById('tar-viag-'+id)?.value) || 0;
  tarifffeSalvate[nome] = { lav: lav, str: str, viag: viag };
  localStorage.setItem('tariffe_costi', JSON.stringify(tarifffeSalvate));
}

function calcolaCosti(){
  if(!commessaSelezionata) return;
  var operai = Object.values(commessaSelezionata.operaiMap);
  var righe = '';
  var totCostoLav = 0, totCostoStr = 0, totCostoViag = 0, totOreLav = 0, totOreStr = 0, totOreViag = 0;

  operai.forEach(function(o){
    var id = btoa(o.nome).replace(/=/g,'');
    var tLav  = parseFloat(document.getElementById('tar-lav-'+id)?.value) || 0;
    var tStr  = parseFloat(document.getElementById('tar-str-'+id)?.value) || 0;
    var tViag = parseFloat(document.getElementById('tar-viag-'+id)?.value) || 0;
    var cLav  = o.oreLav  * tLav;
    var cStr  = o.oreStr  * tStr;
    var cViag = o.oreViag * tViag;
    var totOp = cLav + cStr + cViag;
    totCostoLav  += cLav;
    totCostoStr  += cStr;
    totCostoViag += cViag;
    totOreLav  += o.oreLav;
    totOreStr  += o.oreStr;
    totOreViag += o.oreViag;
    righe += '<tr>'+
      '<td style="font-weight:500">'+esc(o.nome)+'</td>'+
      '<td style="text-align:right;font-family:var(--mono)">'+fmt(o.oreLav)+'</td>'+
      '<td style="text-align:right;font-family:var(--mono)">'+fmtEur(tLav)+'</td>'+
      '<td style="text-align:right;font-family:var(--mono);color:var(--green)">'+fmtEur(cLav)+'</td>'+
      '<td style="text-align:right;font-family:var(--mono)">'+fmt(o.oreStr)+'</td>'+
      '<td style="text-align:right;font-family:var(--mono)">'+fmtEur(tStr)+'</td>'+
      '<td style="text-align:right;font-family:var(--mono);color:var(--amber)">'+fmtEur(cStr)+'</td>'+
      '<td style="text-align:right;font-family:var(--mono)">'+fmt(o.oreViag)+'</td>'+
      '<td style="text-align:right;font-family:var(--mono)">'+fmtEur(tViag)+'</td>'+
      '<td style="text-align:right;font-family:var(--mono);color:var(--blue)">'+fmtEur(cViag)+'</td>'+
      '<td style="text-align:right;font-family:var(--mono);font-weight:600;color:var(--red)">'+fmtEur(totOp)+'</td>'+
    '</tr>';
  });

  // Riga totali
  var totTot = totCostoLav + totCostoStr + totCostoViag;
  righe += '<tr style="background:var(--surface2);font-weight:600">'+
    '<td>TOTALE</td>'+
    '<td style="text-align:right;font-family:var(--mono)">'+fmt(totOreLav)+'</td>'+
    '<td></td>'+
    '<td style="text-align:right;font-family:var(--mono);color:var(--green)">'+fmtEur(totCostoLav)+'</td>'+
    '<td style="text-align:right;font-family:var(--mono)">'+fmt(totOreStr)+'</td>'+
    '<td></td>'+
    '<td style="text-align:right;font-family:var(--mono);color:var(--amber)">'+fmtEur(totCostoStr)+'</td>'+
    '<td style="text-align:right;font-family:var(--mono)">'+fmt(totOreViag)+'</td>'+
    '<td></td>'+
    '<td style="text-align:right;font-family:var(--mono);color:var(--blue)">'+fmtEur(totCostoViag)+'</td>'+
    '<td style="text-align:right;font-family:var(--mono);color:var(--red);font-size:15px">'+fmtEur(totTot)+'</td>'+
  '</tr>';

  el('tbody-risultato').innerHTML = righe;

  // Barra totali
  el('tot-bar').innerHTML =
    '<div class="tot-item"><div class="tot-label">Costo ordinario</div><div class="tot-val green">'+fmtEur(totCostoLav)+'</div></div>'+
    '<div class="tot-item"><div class="tot-label">Costo straordinario</div><div class="tot-val amber">'+fmtEur(totCostoStr)+'</div></div>'+
    '<div class="tot-item"><div class="tot-label">Costo viaggio</div><div class="tot-val blue">'+fmtEur(totCostoViag)+'</div></div>'+
    '<div class="tot-item" style="margin-left:auto"><div class="tot-label">Totale manodopera</div><div class="tot-val big red">'+fmtEur(totTot)+'</div></div>';

  el('step3').style.display = 'block';
  el('step3').scrollIntoView({ behavior: 'smooth' });
}

function resetSelezione(){
  commessaSelezionata = null;
  el('step1').style.display = 'block';
  el('step2').style.display = 'none';
  el('step3').style.display = 'none';
}

// Avvio
caricaCommesse();
</script>
</body>
</html>
