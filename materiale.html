<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Richiesta Materiale Elettrico</title>
  <style>
    *{box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f7fa;margin:0;padding:20px;color:#333}
    .container{max-width:1000px;margin:0 auto;background:#fff;padding:30px;border-radius:8px;box-shadow:0 2px 10px rgba(0,0,0,.08)}
    h1{color:#1a73e8;border-bottom:2px solid #1a73e8;padding-bottom:10px;margin-top:0}
    h2{color:#555;font-size:17px;margin-top:25px}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:15px;margin-bottom:20px}
    .field{display:flex;flex-direction:column}
    label{font-size:13px;font-weight:600;margin-bottom:5px;color:#555}
    .req{color:#e53935}
    input,select,textarea{padding:10px;border:1px solid #dadce0;border-radius:4px;font-size:14px;font-family:inherit}
    input:focus,select:focus,textarea:focus{outline:none;border-color:#1a73e8;box-shadow:0 0 0 2px rgba(26,115,232,.2)}
    textarea{resize:vertical;min-height:60px}
    table{width:100%;border-collapse:collapse;margin-top:10px}
    th{background:#1a73e8;color:#fff;padding:10px;text-align:left;font-size:13px}
    td{padding:5px}
    .materiali-table input,.materiali-table select{width:100%;padding:6px 8px;font-size:13px}
    .btn{padding:10px 20px;border:none;border-radius:4px;cursor:pointer;font-size:14px;font-weight:500}
    .btn-primary{background:#1a73e8;color:#fff}
    .btn-primary:hover{background:#1557b0}
    .btn-primary:disabled{background:#999;cursor:not-allowed}
    .btn-secondary{background:#f1f3f4;color:#333}
    .btn-danger{background:#fce8e6;color:#e53935;padding:6px 10px;font-size:12px}
    .actions{margin-top:25px;display:flex;gap:10px;justify-content:flex-end}
    .add-row{margin-top:10px;background:#e8f0fe;color:#1a73e8;padding:8px 14px}
    .alert{padding:12px 16px;border-radius:4px;margin:15px 0;font-size:14px;display:none}
    .alert.show{display:block}
    .alert-success{background:#e6f4ea;color:#137333;border-left:4px solid #137333}
    .alert-error{background:#fce8e6;color:#c5221f;border-left:4px solid #c5221f}
    .loading{display:none;text-align:center;padding:20px}
    .loading.show{display:block}
    .spinner{border:3px solid #f3f3f3;border-top:3px solid #1a73e8;border-radius:50%;width:30px;height:30px;animation:spin 1s linear infinite;margin:0 auto}
    @keyframes spin{to{transform:rotate(360deg)}}
    .toast{position:fixed;top:30px;left:50%;transform:translateX(-50%) translateY(-120px);background:#1a1a18;color:#fff;padding:18px 32px;border-radius:10px;font-size:16px;font-weight:600;z-index:9999;box-shadow:0 8px 32px rgba(0,0,0,.25);transition:transform .4s cubic-bezier(.34,1.56,.64,1);display:flex;align-items:center;gap:12px;min-width:280px;justify-content:center}
    .toast.show{transform:translateX(-50%) translateY(0)}
    .toast-icon{font-size:24px}
    .badge-sede{display:inline-block;background:#e8f0fe;color:#1a73e8;border-radius:12px;padding:2px 10px;font-size:12px;font-weight:600;margin-left:6px}
    .badge-cantiere{display:inline-block;background:#fce8e6;color:#c5221f;border-radius:12px;padding:2px 10px;font-size:12px;font-weight:600;margin-left:6px}
  </style>
</head>
<body>
  <div class="container">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:0">
      <h1 style="margin:0">⚡ Richiesta Materiale Elettrico</h1>
      <a href="procedure/" target="_blank" style="display:inline-flex;align-items:center;gap:8px;padding:10px 18px;background:#1a73e8;color:#fff;border-radius:4px;text-decoration:none;font-size:14px;font-weight:500">
        📁 Procedure
      </a>
    </div>
    <div id="alert" class="alert"></div>

    <form id="form">
      <h2>Dati commessa</h2>
      <div class="grid">
        <div class="field"><label>Commessa <span class="req">*</span></label><input type="text" id="commessa" required placeholder="es. 2026-001"></div>
        <div class="field"><label>Cantiere / Ubicazione <span class="req">*</span></label><input type="text" id="cantiere" required></div>
        <div class="field"><label>Richiedente <span class="req">*</span></label><input type="text" id="richiedente" required></div>
        <div class="field"><label>Email richiedente</label><input type="email" id="emailRichiedente"></div>
        <div class="field"><label>Data richiesta <span class="req">*</span></label><input type="date" id="data" required></div>
        <div class="field"><label>Consegna richiesta</label><input type="date" id="dataConsegna"></div>
        <div class="field"><label>Urgenza <span class="req">*</span></label>
          <select id="urgenza"><option value="NORMALE">Normale</option><option value="URGENTE">Urgente</option><option value="URGENTISSIMO">Urgentissimo</option></select>
        </div>
        <div class="field"><label>Luogo di consegna <span class="req">*</span></label>
          <select id="luogoConsegna">
            <option value="SEDE">📦 In sede</option>
            <option value="CANTIERE">🏗️ Cantiere</option>
          </select>
        </div>
      </div>

      <h2>Materiali richiesti</h2>
      <div style="overflow-x:auto">
        <table class="materiali-table">
          <thead><tr>
            <th style="width:40px">#</th><th style="width:120px">Codice</th>
            <th>Descrizione <span style="color:#ffcdd2">*</span></th>
            <th style="width:80px">Q.tà <span style="color:#ffcdd2">*</span></th>
            <th style="width:80px">U.M.</th><th>Note</th><th style="width:50px"></th>
          </tr></thead>
          <tbody id="righe"></tbody>
        </table>
      </div>
      <button type="button" class="btn add-row" onclick="addRow()">+ Aggiungi riga</button>

      <h2>Note generali</h2>
      <textarea id="noteGenerali" placeholder="Specifiche, modalità di consegna, contatti cantiere, ecc."></textarea>

      <div class="actions">
        <button type="button" class="btn btn-secondary" onclick="resetForm()">Reset</button>
        <button type="submit" class="btn btn-primary" id="btnInvia">Invia richiesta</button>
      </div>
    </form>
    <div id="loading" class="loading"><div class="spinner"></div><p>Invio in corso...</p></div>
  </div>

  <!-- TOAST CONFERMA -->
  <div class="toast" id="toast">
    <span class="toast-icon">✅</span>
    <span id="toast-msg">Richiesta inviata!</span>
  </div>

  <script>
    // ====== CONFIGURAZIONE — MODIFICA QUESTE DUE RIGHE ======
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwZfqQYlX5ESNT581caNx6sQHrfM-2S7ClcUHjEMWhOUsaz2ZJ3wuJ78SfKpoLPZ5P2hA/exec';
    const TOKEN = 'tcs-2026-xK9pQ2mN';
    // =========================================================

    const UM = ['pz','m','ml','kg','cf','rotolo','mt²','l','set'];

    function addRow(){
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td class="num" style="text-align:center"></td>
        <td><input type="text" class="codice"></td>
        <td><input type="text" class="descr" required></td>
        <td><input type="number" class="qta" step="0.01" min="0" required></td>
        <td><select class="um">${UM.map(u=>`<option>${u}</option>`).join('')}</select></td>
        <td><input type="text" class="note"></td>
        <td><button type="button" class="btn btn-danger" onclick="delRow(this)">✕</button></td>`;
      document.getElementById('righe').appendChild(tr);
      renum();
    }
    function delRow(b){
      if(document.querySelectorAll('#righe tr').length === 1){ alertMsg('Deve esserci almeno una riga','error'); return; }
      b.closest('tr').remove(); renum();
    }
    function renum(){ document.querySelectorAll('#righe tr').forEach((tr,i)=>tr.querySelector('.num').textContent=i+1); }
    function resetForm(){
      document.getElementById('form').reset();
      document.getElementById('righe').innerHTML=''; addRow(); setOggi();
    }
    function setOggi(){ document.getElementById('data').value = new Date().toISOString().split('T')[0]; }
    function showToast(msg){
      const t=document.getElementById('toast');
      const tm=document.getElementById('toast-msg');
      tm.textContent=msg;
      t.classList.add('show');
      setTimeout(()=>t.classList.remove('show'),3500);
    }

    function alertMsg(m,t){
      const a=document.getElementById('alert');
      a.textContent=m; a.className='alert show alert-'+t;
      window.scrollTo({top:0,behavior:'smooth'});
      if(t==='success') setTimeout(()=>a.classList.remove('show'),5000);
    }

    document.getElementById('form').addEventListener('submit', e=>{
      e.preventDefault();
      const mat=[];
      let ok=true;
      document.querySelectorAll('#righe tr').forEach(tr=>{
        const d=tr.querySelector('.descr').value.trim();
        const q=tr.querySelector('.qta').value;
        if(!d||!q){ok=false;return;}
        mat.push({
          codice:tr.querySelector('.codice').value.trim(),
          descrizione:d, quantita:q,
          unita:tr.querySelector('.um').value,
          note:tr.querySelector('.note').value.trim()
        });
      });
      if(!ok||!mat.length){ alertMsg('Compila almeno una riga (descrizione + quantità)','error'); return; }

      const dati={
        token: TOKEN,
        commessa:commessa.value.trim(), cantiere:cantiere.value.trim(),
        richiedente:richiedente.value.trim(), emailRichiedente:emailRichiedente.value.trim(),
        data:data.value, dataConsegna:dataConsegna.value, urgenza:urgenza.value,
        luogoConsegna:luogoConsegna.value,
        noteGenerali:noteGenerali.value.trim(), materiali:mat
      };

      btnInvia.disabled=true; document.getElementById('loading').classList.add('show');

      fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify(dati)
      })
      .then(r => r.json())
      .then(r => {
        document.getElementById('loading').classList.remove('show');
        btnInvia.disabled=false;
        alertMsg(r.message, r.success?'success':'error');
        if(r.success){ showToast('✓ Richiesta inviata con successo!'); resetForm(); }
      })
      .catch(err => {
        document.getElementById('loading').classList.remove('show');
        btnInvia.disabled=false;
        alertMsg('Errore di rete: '+err.message,'error');
      });
    });

    setOggi(); addRow();
  </script>
</body>
</html>
